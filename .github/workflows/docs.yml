name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    uses: IndrajeetPatil/workflows/.github/workflows/python-docs.yaml@main
    permissions:
      contents: read
      pages: write
      id-token: write
