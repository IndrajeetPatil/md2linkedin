name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (leave blank to use version from pyproject.toml)"
        required: false
        default: ""

permissions:
  contents: write
  id-token: write

jobs:
  release:
    uses: IndrajeetPatil/workflows/.github/workflows/python-release.yaml@main
    with:
      version: ${{ github.event.inputs.version }}
    permissions:
      contents: write
      id-token: write
